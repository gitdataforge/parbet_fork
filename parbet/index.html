<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    
    <!-- FEATURE 1: Strict Mobile Viewport Lock (Prevents UI breaking on input focus) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    
    <!-- FEATURE 2: Cross-Browser Legacy Render Engine Compatibility -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    
    <!-- GLOBAL REBRAND: Root Title Update -->
    <title>Booknshow</title>
    
    <!-- FEATURE 3: Network Optimization & Warning Resolution -->
    <link rel="dns-prefetch" href="https://checkout.razorpay.com" />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    
    <!-- FEATURE 4: Database Preconnection for Rapid TTFB (Time to First Byte) -->
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin />
    
    <!-- FEATURE 5: Progressive Web App (PWA) Theme Engine - Updated to #333333 -->
    <meta name="theme-color" content="#333333" />
    <meta name="application-name" content="Booknshow" />
    
    <!-- FEATURE 6: Universal Web App Capable Resolution (Fixes Deprecation Warning) -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/vite.svg" />
    
    <!-- FEATURE 7: Search Engine Optimization (SEO) Core Engine - Rebranded -->
    <meta name="description" content="Securely buy and sell premium event tickets on Booknshow with 100% guarantee and instant digital delivery." />
    <meta name="keywords" content="tickets, events, concerts, sports, booknshow, marketplace, live events" />
    
    <!-- FEATURE 8: Open Graph (OG) Social Media Unfurling (Facebook/LinkedIn) - Rebranded -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Booknshow | The Premier Ticket Marketplace" />
    <meta property="og:description" content="Securely buy and sell premium event tickets on Booknshow. 100% Guaranteed." />
    <meta property="og:image" content="https://parbet-44902.web.app/vite.svg" />
    <meta property="og:locale" content="en_IN" />
    
    <!-- FEATURE 9: Twitter Cards Metadata Engine - Rebranded -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Booknshow | Event Tickets" />
    <meta name="twitter:description" content="Securely buy and sell premium event tickets on Booknshow. 100% Guaranteed." />
    <meta name="twitter:image" content="https://parbet-44902.web.app/vite.svg" />
    <meta name="twitter:site" content="@booknshow" />
    
    <!-- FEATURE 10: Search Engine Indexing Canonicalization -->
    <link rel="canonical" href="https://parbet-44902.web.app" />
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- FEATURE 11: Secure Razorpay Checkout SDK Integration -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
